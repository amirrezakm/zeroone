<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>صفحه پیدا نشد</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f8fafc;
      color: #1f2933;
      font-family: Tahoma, Arial, sans-serif;
    }
    main { width: min(560px, calc(100% - 32px)); }
    h1 { font-size: 24px; margin: 0 0 8px; }
    p { color: #64748b; margin: 0; line-height: 1.8; }
  </style>
</head>
<body>
  <main>
    <h1>صفحه پیدا نشد</h1>
    <p>آدرس وارد شده در حال حاضر در دسترس نیست.</p>
  </main>
</body>
</html>
