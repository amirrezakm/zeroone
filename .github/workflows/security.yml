name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 06:30 UTC — picks up newly-published CVEs.
    - cron: "30 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  # ---------------------------------------------------------------------
  # Go vulnerability database scan (golang.org/x/vuln).
  # ---------------------------------------------------------------------
  govulncheck:
    name: Go vuln scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck -show verbose ./...

  # ---------------------------------------------------------------------
  # Filesystem scan for vulnerable dependencies + misconfigurations.
  # Uploads SARIF to the Security tab on push to main.
  # ---------------------------------------------------------------------
  trivy-fs:
    name: Trivy (filesystem)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
          exit-code: "0"
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # ---------------------------------------------------------------------
  # Build the production image (no push) and scan it.
  # ---------------------------------------------------------------------
  trivy-image:
    name: Trivy (container)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build local image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: zeroone:scan
          build-args: |
            VERSION=scan-${{ github.sha }}
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: zeroone:scan
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: sarif
          output: trivy-image.sarif
          exit-code: "0"
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
