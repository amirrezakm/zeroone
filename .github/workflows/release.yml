name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  image:
    name: Build & push multi-arch image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: extract version
        id: vars
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
      - name: build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.vars.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}

  archive:
    name: Build release tarball
    runs-on: ubuntu-latest
    needs: image
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/app/package-lock.json
      - name: install ui deps
        working-directory: web/app
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install --no-audit --no-fund; fi
      - name: build ui
        working-directory: web/app
        run: npm run build
      - name: build daemon
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          go build -mod=vendor -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o dist/xray-stackd ./cmd/xray-stackd
      - name: package
        run: |
          VERSION=${{ github.ref_name }}
          PKG=zeroone-${VERSION}-linux-${{ matrix.arch }}
          mkdir -p dist/${PKG}/{bin,ui,config,systemd,docs,scripts}
          install -m 0755 dist/xray-stackd                       dist/${PKG}/bin/xray-stackd
          cp -r web/app/dist/.                                   dist/${PKG}/ui/
          install -m 0644 config/stack.example.json              dist/${PKG}/config/stack.example.json
          install -m 0644 deploy/systemd/xray-stackd.service     dist/${PKG}/systemd/xray-stackd.service
          install -m 0644 deploy/skeleton/xray.service           dist/${PKG}/systemd/xray.service
          install -m 0644 deploy/DEPLOY.md                       dist/${PKG}/docs/DEPLOY.md
          install -m 0644 README.md LICENSE CHANGELOG.md         dist/${PKG}/
          install -m 0755 scripts/install.sh                     dist/${PKG}/scripts/install.sh
          tar -C dist -czf dist/${PKG}.tar.gz ${PKG}
          (cd dist && sha256sum ${PKG}.tar.gz > ${PKG}.tar.gz.sha256)
      - name: upload
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/zeroone-${{ github.ref_name }}-linux-${{ matrix.arch }}.tar.gz
            dist/zeroone-${{ github.ref_name }}-linux-${{ matrix.arch }}.tar.gz.sha256
